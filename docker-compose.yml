name: sales-operation-system

services:
  db:
    image: postgres:16
    container_name: sales_operation_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_operation_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
